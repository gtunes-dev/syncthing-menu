name: CI

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'
      - '.gitignore'
      - 'design/**'
      - 'docs/**'
  pull_request:
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'
      - '.gitignore'
      - 'design/**'
      - 'docs/**'

# Ad-hoc-signed build + unit tests for fast PR validation. No secrets required —
# Developer ID signing and notarization happen only in the release workflow.
jobs:
  build:
    name: Build & Test
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Select latest stable Xcode
        # Match the release workflow: the project is in Xcode 16+ format
        # (objectVersion 77), so avoid an older default Xcode.
        run: |
          XC="$(ls -d /Applications/Xcode_*.app 2>/dev/null | grep -vi beta | sort -V | tail -1)"
          if [ -n "$XC" ]; then sudo xcode-select -s "$XC"; fi
          xcodebuild -version

      - name: Clear SwiftPM artifact cache
        # SwiftPM wedges on a partially-downloaded binary artifact ("... already
        # exists in file system" for Sparkle's zip, seen 2026-07-09); a stale
        # cache on the runner is never worth keeping. Start clean.
        run: rm -rf ~/Library/Caches/org.swift.swiftpm/artifacts

      - name: Build & Test
        # Ad-hoc signing (identity "-"): the unit tests are hosted in the app
        # binary, so the app must actually be runnable — unlike a plain build.
        # NSUnbufferedIO keeps xcodebuild's piped output in order; xcbeautify
        # renders the readable console log, while the raw stream — os_log
        # diagnostics included — goes to a file that is uploaded as an artifact
        # if anything fails.
        #
        # xcbeautify is expected on the stock runner image (not installed by
        # us). It's cosmetic, so if the image ever drops it the step must NOT
        # fail — the guard below falls back to raw output with a visible
        # warning annotation instead.
        # The tests are Swift Testing only, but xcodebuild always runs the legacy
        # XCTest harness over the bundle first, printing an empty "'All tests'
        # ... Executed 0 tests" report that reads like a broken duplicate run.
        # That pass can't be disabled, so drop exactly its lines from the console
        # view (the raw artifact log keeps everything). If XCTest-style tests are
        # ever added, their per-suite results still show — only the 'All tests'
        # aggregate and zero-executed summaries are filtered.
        run: |
          set -o pipefail
          render() { xcbeautify --renderer github-actions; }
          if ! command -v xcbeautify >/dev/null; then
            echo "::warning::xcbeautify is missing from the runner image — showing raw xcodebuild output"
            render() { cat; }
          fi
          NSUnbufferedIO=YES xcodebuild \
            -project SyncthingMenu.xcodeproj \
            -scheme SyncthingMenu \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY=- CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=YES \
            test 2>&1 | tee xcodebuild-raw.log \
            | grep -vE "^Test Suite 'All tests' (started|passed) at|^[[:space:]]*Executed 0 tests, with 0 failures \(0 unexpected\)" \
            | render

      - name: Upload raw build/test log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-raw-log
          path: xcodebuild-raw.log
