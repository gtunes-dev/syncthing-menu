name: CI

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'
      - '.gitignore'
      - 'design/**'
      - 'docs/**'
  pull_request:
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'
      - '.gitignore'
      - 'design/**'
      - 'docs/**'

# Unsigned build for fast PR validation. No secrets required — signing and
# notarization happen only in the release workflow.
jobs:
  build:
    name: Build (unsigned)
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Select latest stable Xcode
        # Match the release workflow: the project is in Xcode 16+ format
        # (objectVersion 77), so avoid an older default Xcode.
        run: |
          XC="$(ls -d /Applications/Xcode_*.app 2>/dev/null | grep -vi beta | sort -V | tail -1)"
          if [ -n "$XC" ]; then sudo xcode-select -s "$XC"; fi
          xcodebuild -version

      - name: Build
        run: |
          xcodebuild \
            -project SyncthingMenu.xcodeproj \
            -target SyncthingMenu \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            build
