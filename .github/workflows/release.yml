name: Release

# Build → Developer ID sign → notarize → staple → publish a Sparkle update, on
# every version tag push (e.g. v0.1.0).
#
# The signed .zip is published two ways: attached to a GitHub Release (for people
# browsing the Releases tab) and copied onto the gh-pages site, which is where
# Sparkle's appcast enclosure points (a uniform URL, which generate_appcast's
# single --download-url-prefix requires). generate_appcast regenerates the
# EdDSA-signed appcast.xml on gh-pages and auto-manages older versions.
#
# Required repository secrets:
#   DEVELOPER_ID_P12_BASE64    base64 of the Developer ID Application .p12
#   DEVELOPER_ID_P12_PASSWORD  the .p12 export password
#   NOTARY_KEY_P8_BASE64       base64 of the App Store Connect API key (.p8)
#   NOTARY_KEY_ID              App Store Connect Key ID
#   NOTARY_ISSUER              App Store Connect Issuer ID
#   SPARKLE_ED_PRIVATE_KEY     the exported Sparkle EdDSA private key
#
# One-time repo setup (B2): enable Pages with source = gh-pages branch (root).

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing version tag to (re)publish, e.g. v0.1.0'
        required: true

permissions:
  contents: write   # create the GitHub Release and push the gh-pages branch

concurrency:
  group: release    # serialize releases so gh-pages pushes don't race
  cancel-in-progress: false

env:
  PAGES_URL: https://gtunes-dev.github.io/syncthing-menu
  SPARKLE_VERSION: "2.9.3"

jobs:
  release:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history → monotonic build number via rev-list

      - name: Select latest stable Xcode
        # The project is in Xcode 16+ format (objectVersion 77); the runner's
        # default Xcode can be older, so pick the newest non-beta Xcode present.
        run: |
          XC="$(ls -d /Applications/Xcode_*.app 2>/dev/null | grep -vi beta | sort -V | tail -1)"
          if [ -n "$XC" ]; then sudo xcode-select -s "$XC"; fi
          xcodebuild -version

      - name: Resolve version
        id: ver
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          BUILD="$(git rev-list --count HEAD)"
          {
            echo "tag=$TAG"
            echo "version=$VERSION"
            echo "build=$BUILD"
          } >> "$GITHUB_OUTPUT"
          echo "Releasing $VERSION (build $BUILD) from tag $TAG"

      - name: Import Developer ID certificate
        env:
          P12_BASE64: ${{ secrets.DEVELOPER_ID_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.DEVELOPER_ID_P12_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PW="$(openssl rand -base64 24)"
          echo "$P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$P12_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/xcodebuild
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PW" "$KEYCHAIN" >/dev/null
          # Put our keychain first in the search list so xcodebuild/codesign find the identity.
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed 's/"//g')
          rm -f "$RUNNER_TEMP/cert.p12"
          security find-identity -v -p codesigning "$KEYCHAIN"

      - name: Sign & notarize
        id: build
        env:
          NOTARY_KEY_ID: ${{ secrets.NOTARY_KEY_ID }}
          NOTARY_ISSUER: ${{ secrets.NOTARY_ISSUER }}
          NOTARY_KEY_P8_BASE64: ${{ secrets.NOTARY_KEY_P8_BASE64 }}
          RELEASE_VERSION: ${{ steps.ver.outputs.version }}
          BUILD_NUMBER: ${{ steps.ver.outputs.build }}
        run: |
          echo "$NOTARY_KEY_P8_BASE64" | base64 --decode > "$RUNNER_TEMP/notary.p8"
          NOTARY_KEY="$RUNNER_TEMP/notary.p8" ./Scripts/sign-and-notarize.sh
          rm -f "$RUNNER_TEMP/notary.p8"
          echo "zip=build/SyncthingMenu-${RELEASE_VERSION}.zip" >> "$GITHUB_OUTPUT"

      - name: Download Sparkle tools
        run: |
          curl -fsSL -o "$RUNNER_TEMP/sparkle.tar.xz" \
            "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz"
          mkdir -p "$RUNNER_TEMP/sparkle"
          tar -xf "$RUNNER_TEMP/sparkle.tar.xz" -C "$RUNNER_TEMP/sparkle"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.ver.outputs.tag }}" \
            "${{ steps.build.outputs.zip }}" \
            --title "${{ steps.ver.outputs.version }}" \
            --generate-notes

      - name: Publish Sparkle appcast (gh-pages)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: |
          REPO_URL="https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          # Restore the published site (prior archives + appcast) so generate_appcast
          # updates it incrementally; start fresh on the very first release.
          if git ls-remote --exit-code --heads "$REPO_URL" gh-pages >/dev/null 2>&1; then
            git clone --branch gh-pages --depth 1 "$REPO_URL" site
          else
            mkdir site && git -C site init -q && git -C site checkout -q -b gh-pages
          fi
          cp "${{ steps.build.outputs.zip }}" site/
          # Regenerate the EdDSA-signed appcast. Enclosure URLs use the uniform
          # Pages prefix; the private key is piped in (never written to disk).
          printf '%s' "$SPARKLE_ED_PRIVATE_KEY" | \
            "$RUNNER_TEMP/sparkle/bin/generate_appcast" \
              --ed-key-file - \
              --download-url-prefix "${PAGES_URL}/" \
              site
          git -C site config user.name  "github-actions[bot]"
          git -C site config user.email "github-actions[bot]@users.noreply.github.com"
          git -C site add -A
          git -C site commit -m "Release ${{ steps.ver.outputs.version }}"
          git -C site push "$REPO_URL" HEAD:gh-pages
